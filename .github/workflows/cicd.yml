name: Agala CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.0)"
        required: true
        type: string

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ── Always runs ──────────────────────────────────────────
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Expo Doctor
        run: npx expo-doctor

  # ── Only on main push / manual dispatch ──────────────────
  version:
    name: Determine Version
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      number: ${{ steps.version.outputs.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            # Auto-increment: find latest tag, bump patch
            LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n1)
            if [ -z "$LATEST" ]; then
              VERSION="1.0.0"
            else
              VERSION="${LATEST#v}"
              MAJOR=$(echo "$VERSION" | cut -d. -f1)
              MINOR=$(echo "$VERSION" | cut -d. -f2)
              PATCH=$(echo "$VERSION" | cut -d. -f3)
              PATCH=$((PATCH + 1))
              VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "number=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing: v${VERSION}"

  build:
    name: EAS Build
    if: github.event_name != 'pull_request'
    needs: [quality, version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update app version
        run: |
          VERSION="${{ needs.version.outputs.number }}"
          # Update package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          # Update app.json
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo.version = '${VERSION}';
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
          "
          echo "Updated app version to ${VERSION}"

      - name: Generate Hebrew notes for in-app popup and Google Play
        run: node scripts/generate-release-notes.js "${{ needs.version.outputs.number }}" --embed-in-app > /dev/null

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Verify EAS CLI
        run: eas --version && eas whoami

      - name: Build Android (production - AAB for Google Play)
        env:
          EAS_NO_VCS: "1"
          EAS_BUILD_NO_EXPO_GO_WARNING: "true"
        run: eas build --platform android --profile production --non-interactive

      - name: Write Google Service Account key
        if: env.GOOGLE_SERVICE_ACCOUNT_KEY != ''
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: echo "$GOOGLE_SERVICE_ACCOUNT_KEY" > ./google-service-account-key.json

      - name: Submit to Google Play (internal track)
        if: env.GOOGLE_SERVICE_ACCOUNT_KEY != ''
        env:
          EAS_NO_VCS: "1"
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: eas submit --platform android --profile production --latest --non-interactive

  release:
    name: GitHub Release
    if: github.event_name != 'pull_request'
    needs: [version, quality, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate release notes
        id: notes
        run: |
          OUTPUT=$(node scripts/generate-release-notes.js "${{ needs.version.outputs.number }}")
          HTML=$(echo "$OUTPUT" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).html)")
          echo "html<<NOTESEOF" >> "$GITHUB_OUTPUT"
          echo "$HTML" >> "$GITHUB_OUTPUT"
          echo "NOTESEOF" >> "$GITHUB_OUTPUT"

      - name: Bump version in source
        run: |
          VERSION="${{ needs.version.outputs.number }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo.version = '${VERSION}';
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
          "

      - name: Commit version bump, reset release notes & create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Reset RELEASE_NOTES_NEXT.md for the next cycle
          cat > RELEASE_NOTES_NEXT.md << 'RESET'
          # Release Notes — Next Version

          > This file accumulates user-facing release notes (Hebrew) for the upcoming release.
          > Updated by Copilot before each PR merge using the `pr-release-summary` skill.
          > CI reads this file to generate Google Play, email, and in-app release notes.
          > After a release is published, this file is reset to empty.

          ---

          <!-- Add notes below this line — newest on top -->
          RESET
          git add package.json app.json RELEASE_NOTES_NEXT.md
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ needs.version.outputs.number }} [skip ci]"
          git tag ${{ needs.version.outputs.tag }}
          git push origin main --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: "עגלה ${{ needs.version.outputs.number }}"
          generate_release_notes: true

      - name: Send release notification email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_FROM }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          to: ${{ secrets.EMAIL_TO }}
          from: "עגלה CI/CD <${{ secrets.EMAIL_FROM }}>"
          subject: "🛒 עגלה ${{ needs.version.outputs.number }} — גרסה חדשה זמינה לבדיקה!"
          html_body: |
            <div dir="rtl" style="font-family: Arial, sans-serif; max-width: 600px; margin: auto; background: #0f0f1a; color: #e0e0f0; padding: 32px; border-radius: 12px;">
              <h1 style="color: #8b9fe8; margin-bottom: 4px;">🛒 עגלה — גרסה ${{ needs.version.outputs.number }}</h1>
              <p style="color: #888; margin-top: 0;">עודכנה בהצלחה ● ${{ github.event.head_commit.timestamp }}</p>

              <hr style="border-color: #2a2a3e; margin: 24px 0;" />

              <h2 style="color: #e0e0f0;">🎉 מה חדש בגרסה הזו?</h2>
              ${{ steps.notes.outputs.html }}

              <hr style="border-color: #2a2a3e; margin: 24px 0;" />

              <h2 style="color: #e0e0f0;">📲 איך להתקין?</h2>
              <p style="color: #c0c0d8; line-height: 1.7;">
                הגרסה הועלתה ל-<strong>Internal Testing</strong> ב-Google Play.<br/>
                לחץ על הקישור למטה כדי להצטרף לתוכנית הבדיקות:
              </p>

              <div style="text-align: center; margin: 24px 0;">
                <a href="https://play.google.com/store/apps/details?id=com.omerelezra.agala"
                   style="background: #8b9fe8; color: #0f0f1a; padding: 14px 32px; border-radius: 8px;
                          text-decoration: none; font-weight: bold; font-size: 16px; display: inline-block;">
                  📥 הורד מ-Google Play
                </a>
              </div>

              <p style="color: #c0c0d8; font-size: 13px; line-height: 1.6;">
                🔗 GitHub Release:
                <a href="https://github.com/omerElezra/Agala/releases/tag/${{ needs.version.outputs.tag }}"
                   style="color: #8b9fe8;">
                  github.com/omerElezra/Agala/releases/${{ needs.version.outputs.tag }}
                </a>
              </p>

              <hr style="border-color: #2a2a3e; margin: 24px 0;" />
              <p style="color: #555; font-size: 12px; text-align: center;">
                נשלח אוטומטית על ידי GitHub Actions · עגלה CI/CD
              </p>
            </div>
